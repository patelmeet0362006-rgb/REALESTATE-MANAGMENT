<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Schedule a Consultation | Apex Urban Realty</title>
  <meta name="description" content="Book a private tour, virtual tour, or real estate advisory consultation with our principal advisors.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css?v=7.0">
  <link rel="stylesheet" href="css/animations.css">

  <script src="https://unpkg.com/feather-icons"></script>
</head>
<body>
  <header class="header scrolled" id="home">
    <div class="container header-container">
      <a href="index.html" class="logo-link" aria-label="Apex Urban home">
        <img src="images/logo.svg" alt="Apex Urban Logo" class="logo-icon">
        <span>Apex Urban</span>
      </a>

      <nav class="nav-menu" role="navigation" aria-label="Main Navigation">
        <li><a href="index.html#home" class="nav-link">Home</a></li>
        <li><a href="index.html#properties" class="nav-link">Properties</a></li>
        <li><a href="index.html#calculator" class="nav-link">Mortgage Calc</a></li>
      </nav>

      <div class="nav-actions">
        <a href="index.html#contact" class="nav-link">Contact</a>

        <!-- Account Dropdown -->
        <div class="account-dropdown-wrapper" id="account-dropdown-wrapper">
          <button class="btn btn-outline account-dropdown-btn" id="account-dropdown-btn" aria-label="My Account Menu" aria-expanded="false" aria-haspopup="true">
            <i data-feather="user" style="width: 16px; height: 16px;"></i>
            <span id="account-btn-text">My Account</span>
            <i data-feather="chevron-down" style="width: 12px; height: 12px;"></i>
          </button>

          <div class="account-dropdown-menu" id="account-dropdown-menu" role="menu">
            <!-- Rendered dynamically by main.js -->
          </div>
        </div>
      </div>

      <button class="mobile-toggle" aria-label="Toggle Navigation Menu">
        <i data-feather="menu"></i>
      </button>
    </div>
  </header>

  <main style="padding-top: calc(var(--header-height) + 2rem); min-height: 85vh;">
    <section class="section">
      <div class="container" style="max-width: 760px;">
        <div class="consultation-form-wrapper glass-panel reveal active">
          <div class="consultation-form-intro">
            <span class="section-tag" style="background-color: var(--primary-light); color: var(--primary); margin-bottom: 0.5rem; display: inline-block;">Private Client Services</span>
            <h1 class="section-title" style="text-align: left; font-size: 2.25rem;">Schedule a Consultation</h1>
            <p class="section-subtitle" style="text-align: left;">Arrange private site viewings, virtual architectural inspections, or query luxury properties with our listing desks.</p>
          </div>

          <div class="form-notification" id="consultation-status-msg"></div>

          <form id="consultation-booking-form" novalidate>
            <div class="form-row">
              <div class="form-group">
                <label for="booking-name">Full Name</label>
                <input type="text" id="booking-name" class="form-control" placeholder="e.g. John Patel" required>
              </div>
              <div class="form-group">
                <label for="booking-email">Email Address</label>
                <input type="email" id="booking-email" class="form-control" placeholder="e.g. john@example.com" required>
              </div>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label for="booking-phone">Phone Number</label>
                <input type="tel" id="booking-phone" class="form-control" placeholder="e.g. +91 99999 00000" required>
              </div>
              <div class="form-group">
                <label for="booking-interest">Interest Type</label>
                <select id="booking-interest" class="form-control">
                  <option value="buy">Acquiring Property (Buy)</option>
                  <option value="sell">Listing Property (Sell)</option>
                  <option value="rent">Renting Property (Rent)</option>
                  <option value="general">General Consultation</option>
                </select>
              </div>
            </div>

            <div class="date-time-row">
              <div class="form-group">
                <label for="booking-date">Preferred Date</label>
                <input type="date" id="booking-date" class="form-control" required>
              </div>
              <div class="form-group">
                <label for="booking-time">Preferred Time Slot</label>
                <select id="booking-time" class="form-control">
                  <option value="morning">Morning (9:00 AM - 12:00 PM)</option>
                  <option value="afternoon">Afternoon (12:00 PM - 4:00 PM)</option>
                  <option value="evening">Evening (4:00 PM - 7:00 PM)</option>
                </select>
              </div>
            </div>

            <div class="form-group form-group-full">
              <label for="booking-message">Message details (optional)</label>
              <textarea id="booking-message" class="form-control" placeholder="Provide any property listings of interest, virtual preview requirements, or specific requests..."></textarea>
            </div>

            <button type="submit" class="btn btn-primary btn-lg hover-lift hover-glow" style="width: 100%; justify-content: center; height: 50px; margin-top: 1rem;">
              <i data-feather="calendar"></i> Book Consultation Slot
            </button>
          </form>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container">
      <div class="footer-bottom">
        <p>&copy; 2026 Apex Urban Realty. All rights reserved.</p>
      </div>
    </div>
  </footer>

  <script>
    if (typeof feather !== "undefined") feather.replace();
  </script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="backend/supabase.js"></script>
  <script src="js/main.js?v=7.0"></script>
  <script src="js/consultation.js?v=1.0"></script>
</body>
</html>
